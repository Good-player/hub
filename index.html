<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1c1c1e;
      --sidebar: #161618;
      --surface: #232325;
      --surface-hover: #2a2a2d;
      --border: #3a3a3d;
      --text-primary: #ececec;
      --text-secondary: #8e8e93;
      --text-tertiary: #58585d;
      --accent: #d4a574;
      --badge-bg: #2e2e31;
      --badge-color: #8e8e93;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    body.rtl { direction: rtl; }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 4px;
      min-height: 100vh;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 20px;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .sidebar-logo svg {
      width: 22px;
      height: 22px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13.5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .sidebar-item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background: var(--surface);
      color: var(--text-primary);
    }

    /* Language pills at bottom of sidebar */
    .sidebar-version {
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 0 10px 8px;
    }

    /* Changelog */
    .changelog {
      margin: 4px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      max-height: 340px;
      padding-right: 4px;
    }

    .changelog::-webkit-scrollbar {
      width: 3px;
    }

    .changelog::-webkit-scrollbar-track {
      background: transparent;
    }

    .changelog::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .cl-version {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .cl-item {
      font-size: 11.5px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
    }

    .cl-item::before {
      content: '·';
      position: absolute;
      left: 2px;
      color: var(--text-tertiary);
    }

    .lang-section {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lang-section .sidebar-label {
      padding: 0 10px 4px;
      margin: 0;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .topbar-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ── Content ── */
    .content {
      padding: 32px;
      flex: 1;
      max-width: 800px;
      width: 100%;
    }

    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      background: var(--surface-hover);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--badge-bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .card-badge {
      font-size: 11px;
      font-weight: 500;
      background: var(--badge-bg);
      color: var(--badge-color);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 100px;
    }

    /* ── Arrow ── */
    .card-arrow {
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    .card-arrow svg {
      width: 14px;
      height: 14px;
    }

    /* ── Animations ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Page load — sidebar */
    .sidebar {
      animation: slideInLeft 0.35s ease both;
    }

    /* Page load — cards stagger */
    .card {
      animation: fadeUp 0.35s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }

    /* Page load — topbar */
    .topbar {
      animation: fadeIn 0.3s ease both;
    }

    /* Card hover — arrow slides right */
    .card:hover .card-arrow svg {
      transform: translateX(3px);
      transition: transform 0.2s ease;
    }
    .card-arrow svg {
      transition: transform 0.2s ease;
    }

    /* Card hover — icon pulse */
    .card:hover .card-icon {
      transform: scale(1.08);
      transition: transform 0.2s ease;
    }
    .card-icon {
      transition: transform 0.2s ease;
    }

    /* Changelog label row */
    .changelog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-right: 6px;
    }

    .changelog-refresh {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 2px;
      display: flex;
      align-items: center;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .changelog-refresh:hover { color: var(--text-secondary); }

    .changelog-refresh svg {
      width: 12px;
      height: 12px;
    }

    .changelog-refresh.spinning svg {
      animation: spin 0.7s linear infinite;
    }

    /* Changelog spinner */
    .cl-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 12px auto;
    }

    /* Changelog item entrance */
    .cl-block {
      animation: fadeUp 0.25s ease both;
    }

    /* Sidebar item hover nudge */
    .sidebar-item {
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }
    .sidebar-item:hover {
      transform: translateX(2px);
    }

    /* ── Detail Panel ── */
    @keyframes dpContentIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes dpItemIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main {
      flex: 1;
      display: flex;
      min-width: 0;
    }

    .main-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: none;
    }

    .detail-panel {
      width: 0;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--sidebar);
      border-left: 0px solid var(--border);
      min-height: 100vh;
      transition: width 0.32s cubic-bezier(0.16,1,0.3,1),
                  border-left-width 0.32s cubic-bezier(0.16,1,0.3,1);
    }

    .detail-panel.open {
      width: 300px;
      border-left-width: 1px;
    }

    .dp-content {
      width: 300px;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      min-height: 100vh;
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }

    .detail-panel.open .dp-content {
      opacity: 1;
      transform: translateX(0);
      transition-delay: 0.14s;
      pointer-events: auto;
    }

    .detail-panel.closing .dp-content {
      opacity: 0;
      transform: translateX(16px);
      transition-delay: 0s;
      transition-duration: 0.12s;
    }

    .dp-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .dp-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .dp-close {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      font-family: inherit;
    }

    .dp-close:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .dp-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .dp-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      background: var(--badge-bg);
      color: var(--badge-color);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 18px;
    }

    .dp-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .dp-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .dp-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 16px;
    }

    .dp-meta-row strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .dp-url-box {
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-tertiary);
      word-break: break-all;
      font-family: monospace;
      transition: border-color 0.2s;
    }

    .dp-url-box:hover {
      border-color: rgba(212,165,116,0.35);
    }

    .dp-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 20px;
    }

    .dp-open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #1a1208;
      font-weight: 700;
      font-size: 13.5px;
      text-decoration: none;
      padding: 11px;
      border-radius: 10px;
      transition: opacity 0.15s, transform 0.15s;
      font-family: inherit;
    }

    .dp-open-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .dp-copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      width: 100%;
    }

    .dp-copy-btn:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .dp-copy-btn.copied {
      color: #6bcb77;
      border-color: #6bcb7740;
    }

    /* Selected card state */
    .card {
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.18s;
    }

    .card.selected {
      border-color: var(--accent);
      background: var(--surface-hover);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .card:active {
      transform: scale(0.99);
    }

    /* ── Settings ── */
    .settings-block {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .settings-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px 8px;
    }

    .settings-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 8px 10px 4px;
      opacity: 0.7;
    }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      position: relative;
    }

    .lang-row:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .lang-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .lang-row.active {
      color: var(--text-primary);
    }

    .lang-row.active .lang-dot {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.2);
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px; }
      .topbar { padding: 12px 16px; }
      .detail-panel { display: none !important; }
    }
  </style>
</head>

          <a class="dp-open-btn" id="dp-link" href="#" target="_blank" rel="noopener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            <span data-i18n="dp-open"></span>
          </a>
          <button class="dp-copy-btn" id="dp-copy" onclick="copyLink()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span data-i18n="dp-copy"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const translations = {
      sv: {
        title: "Hub",
        subtitle: "En hub för personliga projekt",
        "nav-projects": "Projekt",
        "nav-language": "Språk",
        "badge-game": "Spel",
        "badge-chat": "Chatt",
        "stv-desc": "En spel som uppdaterar ofta. Som cookie clicker men 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "Har du ingen discord? Använd CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "Ändringslogg",
        "nav-settings": "Inställningar",
        "created-by": "Skapad av",
        "dp-open": "Öppna projekt",
        "dp-copy": "Kopiera länk",
        dir: "ltr",
      },
      en: {
        title: "Hub",
        subtitle: "A hub for personal projects",
        "nav-projects": "Projects",
        "nav-language": "Language",
        "badge-game": "Game",
        "badge-chat": "Chat",
        "stv-desc": "A game that updates often. Like cookie clicker but 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "No Discord? Use CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "Changelog",
        "nav-settings": "Settings",
        "created-by": "Created by",
        "dp-open": "Open project",
        "dp-copy": "Copy link",
        dir: "ltr",
      },
      ar: {
        title: "Hub",
        subtitle: "مركز للمشاريع الشخصية",
        "nav-projects": "المشاريع",
        "nav-language": "اللغة",
        "badge-game": "لعبة",
        "badge-chat": "دردشة",
        "stv-desc": "لعبة تتحدث كثيرًا. مثل cookie clicker ولكن 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "ليس لديك ديسكورد؟ استخدم CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "سجل التغييرات",
        "nav-settings": "الإعدادات",
        "created-by": "أنشأه",
        "dp-open": "فتح المشروع",
        "dp-copy": "نسخ الرابط",
        dir: "rtl",
      },
      ru: {
        title: "Hub",
        subtitle: "Хаб личных проектов",
        "nav-projects": "Проекты",
        "nav-language": "Язык",
        "badge-game": "Игра",
        "badge-chat": "Чат",
        "stv-desc": "Игра, которая часто обновляется. Как cookie clicker, но 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "Нет Discord? Используй CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "Журнал изменений",
        "nav-settings": "Настройки",
        "created-by": "Автор",
        "dp-open": "Открыть проект",
        "dp-copy": "Копировать ссылку",
        dir: "ltr",
      },
    };

    function setLang(code) {
      const t = translations[code];
      document.documentElement.lang = code;
      document.body.classList.toggle('rtl', t.dir === 'rtl');

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      // Mark active lang button
      document.querySelectorAll('.lang-row').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick') === `setLang('${code}')`);
      });

      localStorage.setItem('hub-lang', code);
    }

    const saved = localStorage.getItem('hub-lang');
    setLang(translations[saved] ? saved : 'sv');

    // Load and render CHANGELOG.md
    function loadChangelog() {
      const el = document.getElementById('changelog');
      const btn = document.getElementById('cl-refresh');
      el.innerHTML = '<div class="cl-spinner"></div>';
      btn.classList.add('spinning');

      fetch('CHANGELOG.md?v=' + Date.now())
        .then(r => r.text())
        .then(text => {
          el.innerHTML = '';
          const blocks = text.trim().split(/^(?=## )/m);
          blocks.forEach((block, i) => {
            if (!block.trim()) return;
            const lines = block.trim().split('\n');
            const heading = lines[0].replace(/^## /, '').trim();
            const items = lines.slice(1).filter(l => l.trim().startsWith('-'));
            const div = document.createElement('div');
            div.className = 'cl-block';
            div.style.animationDelay = (i * 0.06) + 's';
            const h = document.createElement('div');
            h.className = 'cl-version';
            h.textContent = heading;
            div.appendChild(h);
            items.forEach(item => {
              const p = document.createElement('div');
              p.className = 'cl-item';
              p.textContent = item.replace(/^- /, '');
              div.appendChild(p);
            });
            el.appendChild(div);
          });
          // Scroll to top to show newest entry
          el.scrollTop = 0;
        })
        .catch(() => {
          el.textContent = '—';
        })
        .finally(() => {
          btn.classList.remove('spinning');
        });
    }

    loadChangelog();

    // ── Project data ──
    const projects = {
      stv: {
        icon: '🍸',
        name: 'Spin the vodka',
        url: 'https://azizbekovski.github.io/spin-the-vodka/',
        badge: 'badge-game',
        desc: 'stv-desc',
        creator: 'Azizbek',
      },
      chatp2p: {
        icon: '💬',
        name: 'CHATp2p',
        url: 'https://good-player.github.io/chatp2p/',
        badge: 'badge-chat',
        desc: 'chat-desc',
        creator: 'William',
      },
      // ══ Add more projects here ══
    };

    let activeProject = null;

    function openProject(id) {
      const p = projects[id];
      if (!p) return;

      // If same card clicked, close
      if (activeProject === id) { closeProject(); return; }
      activeProject = id;

      // Highlight selected card
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      const cards = document.querySelectorAll('.card');
      const idx = Object.keys(projects).indexOf(id);
      if (cards[idx]) cards[idx].classList.add('selected');

      // Populate panel
      const lang = localStorage.getItem('hub-lang') || 'sv';
      const t = translations[lang];

      document.getElementById('dp-icon').textContent    = p.icon;
      document.getElementById('dp-name').textContent    = p.name;
      document.getElementById('dp-badge').textContent   = t[p.badge] || p.badge;
      document.getElementById('dp-desc').textContent    = t[p.desc] || '';
      document.getElementById('dp-creator').textContent = p.creator;
      document.getElementById('dp-url').textContent     = p.url;
      document.getElementById('dp-link').href           = p.url;
      document.getElementById('dp-copy').classList.remove('copied');

      // Re-run i18n on panel static strings
      document.querySelectorAll('#detail-panel [data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });

      // Show panel
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('closing');
      panel.classList.add('open');
    }

    function closeProject() {
      const panel = document.getElementById('detail-panel');
      panel.classList.add('closing');
      // Wait for content to fade out, then collapse width
      setTimeout(() => {
        panel.classList.remove('open', 'closing');
      }, 160);
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      activeProject = null;
    }

    function copyLink() {
      const url = document.getElementById('dp-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('dp-copy');
        const lang = localStorage.getItem('hub-lang') || 'sv';
        btn.classList.add('copied');
        const span = btn.querySelector('[data-i18n]');
        if (span) span.textContent = '✓ Copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          const t = translations[lang];
          if (span) span.textContent = t['dp-copy'] || 'Copy link';
        }, 2000);
      });
    }
  </script>

</body>
</html>
