<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface-hover: #22222f;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent-glow: rgba(124,92,252,0.35);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a8;
      --badge-bg: rgba(124,92,252,0.15);
      --badge-color: #a98bff;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,92,252,0.18) 0%, transparent 70%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 60px 20px 80px;
      color: var(--text-primary);
    }

    /* RTL support for Arabic */
    body.rtl { direction: rtl; }

    /* ── Language switcher ── */
    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .lang-btn:hover {
      border-color: rgba(124,92,252,0.4);
      color: var(--text-primary);
    }

    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, #a98bff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at top left, rgba(124,92,252,0.08), transparent 60%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,92,252,0.3);
      border-color: rgba(124,92,252,0.35);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .card-badge {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--badge-bg);
      color: var(--badge-color);
      padding: 4px 10px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-description {
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.65;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .card-author {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .card-author strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 10px;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .card-link:hover {
      background: #6b4de8;
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .card-link svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .site-footer {
      text-align: center;
      margin-top: 60px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="lang-switcher">
    <button class="lang-btn" onclick="setLang('sv')">🇸🇪 Svenska</button>
    <button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('ar')">🇸🇦 العربية</button>
    <button class="lang-btn" onclick="setLang('ru')">🇷🇺 Русский</button>
  </div>

  <header>
    <h1 data-i18n="title">Hub</h1>
    <p data-i18n="subtitle"></p>
  </header>

  <div class="grid">

    <!-- ══ KORT 1 ══ -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Spin the vodka</span>
        <span class="card-badge" data-i18n="badge-game"></span>
      </div>
      <p class="card-description" data-i18n="stv-desc"></p>
      <div class="card-footer">
        <div class="card-author"><span data-i18n="created-by"></span> <strong>Azizbek</strong></div>
        <a class="card-link" href="https://azizbekovski.github.io/spin-the-vodka/" target="_blank" rel="noopener">
          <span data-i18n="open"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- ══ KORT 2 ══ -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">CHATp2p</span>
        <span class="card-badge" data-i18n="badge-chat"></span>
      </div>
      <p class="card-description" data-i18n="chat-desc"></p>
      <div class="card-footer">
        <div class="card-author"><span data-i18n="created-by"></span> <strong>William</strong></div>
        <a class="card-link" href="https://good-player.github.io/chatp2p/" target="_blank" rel="noopener">
          <span data-i18n="open"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- ══ LÄGG TILL FLER KORT HÄR ══
    <div class="card">
      <div class="card-header">
        <span class="card-title">Titel</span>
        <span class="card-badge" data-i18n="badge-game"></span>
      </div>
      <p class="card-description">Beskrivning av projektet.</p>
      <div class="card-footer">
        <div class="card-author"><span data-i18n="created-by"></span> <strong>Namn</strong></div>
        <a class="card-link" href="https://din-länk.com" target="_blank" rel="noopener">
          <span data-i18n="open"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </a>
      </div>
    </div>
    ══ SLUT PÅ MALL ══ -->

  </div>

  <footer class="site-footer" data-i18n="footer"></footer>

  <script>
    const translations = {
      sv: {
        title: "Hub",
        subtitle: "Utforska projekt skapade av oss",
        "badge-game": "Spel",
        "badge-chat": "Chatt",
        "stv-desc": "En spel som uppdaterar ofta. En spel som cookie clicker men 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "Har du ingen discord? Använd CHATP2P.",
        "created-by": "Skapades av",
        "open": "Öppna",
        "footer": "Hub — alla projekt på ett ställe",
        dir: "ltr",
      },
      en: {
        title: "Hub",
        subtitle: "Explore projects made by us",
        "badge-game": "Game",
        "badge-chat": "Chat",
        "stv-desc": "A game that updates often. Like cookie clicker but 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "No discord? Use CHATP2P.",
        "created-by": "Created by",
        "open": "Open",
        "footer": "Hub — all projects in one place",
        dir: "ltr",
      },
      ar: {
        title: "Hub",
        subtitle: "اكتشف المشاريع التي صنعناها",
        "badge-game": "لعبة",
        "badge-chat": "دردشة",
        "stv-desc": "لعبة تتحدث كثيرًا. مثل cookie clicker ولكن 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "ليس لديك ديسكورد؟ استخدم CHATP2P.",
        "created-by": "بواسطة",
        "open": "فتح",
        "footer": "Hub — جميع المشاريع في مكان واحد",
        dir: "rtl",
      },
      ru: {
        title: "Hub",
        subtitle: "Исследуй наши проекты",
        "badge-game": "Игра",
        "badge-chat": "Чат",
        "stv-desc": "Игра, которая часто обновляется. Как cookie clicker, но 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "Нет Discord? Используй CHATP2P.",
        "created-by": "Создано",
        "open": "Открыть",
        "footer": "Hub — все проекты в одном месте",
        dir: "ltr",
      },
    };

    function setLang(code) {
      const t = translations[code];
      document.documentElement.lang = code;
      document.body.classList.toggle('rtl', t.dir === 'rtl');

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick') === `setLang('${code}')`);
      });

      localStorage.setItem('hub-lang', code);
    }

    // Init: saved preference → browser language → Swedish
    const saved = localStorage.getItem('hub-lang');
    const browser = navigator.language.slice(0, 2);
    const fallback = translations[saved] ? saved : translations[browser] ? browser : 'sv';
    setLang(fallback);
  </script>

</body>
</html>
