<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1c1c1e;
      --sidebar: #161618;
      --surface: #232325;
      --surface-hover: #2a2a2d;
      --border: #3a3a3d;
      --text-primary: #ececec;
      --text-secondary: #8e8e93;
      --text-tertiary: #58585d;
      --accent: #d4a574;
      --badge-bg: #2e2e31;
      --badge-color: #8e8e93;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    body.rtl { direction: rtl; }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 4px;
      min-height: 100vh;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 20px;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .sidebar-logo svg {
      width: 22px;
      height: 22px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13.5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .sidebar-item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background: var(--surface);
      color: var(--text-primary);
    }

    /* Language pills at bottom of sidebar */
    .sidebar-version {
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 0 10px 8px;
    }

    /* Changelog */
    .changelog {
      margin: 4px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      max-height: 340px;
      padding-right: 4px;
    }

    .changelog::-webkit-scrollbar {
      width: 3px;
    }

    .changelog::-webkit-scrollbar-track {
      background: transparent;
    }

    .changelog::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .cl-version {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .cl-item {
      font-size: 11.5px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
    }

    .cl-item::before {
      content: '·';
      position: absolute;
      left: 2px;
      color: var(--text-tertiary);
    }

    .lang-section {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lang-section .sidebar-label {
      padding: 0 10px 4px;
      margin: 0;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .topbar-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ── Content ── */
    .content {
      padding: 32px;
      flex: 1;
      max-width: 800px;
      width: 100%;
    }

    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      background: var(--surface-hover);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--badge-bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .card-badge {
      font-size: 11px;
      font-weight: 500;
      background: var(--badge-bg);
      color: var(--badge-color);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 100px;
    }

    /* ── Arrow ── */
    .card-arrow {
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    .card-arrow svg {
      width: 14px;
      height: 14px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Hub
    </div>

    <div class="sidebar-label" data-i18n="nav-changelog"></div>
    <div class="changelog" id="changelog">…</div>

    <div class="sidebar-label" data-i18n="nav-projects"></div>
    <a class="sidebar-item active" href="https://azizbekovski.github.io/spin-the-vodka/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M8 12l4-4 4 4M12 8v8"/>
      </svg>
      Spin the vodka
    </a>
    <a class="sidebar-item" href="https://good-player.github.io/chatp2p/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      CHATp2p
    </a>

    <!-- Version -->
    <div class="lang-section" style="border-top:none; padding-top:8px; margin-top:auto;">
      <div class="sidebar-version">v1.1.3</div>
    </div>

    <!-- Language switcher -->
    <div class="lang-section">
      <div class="sidebar-label" data-i18n="nav-language"></div>
      <button class="sidebar-item" onclick="setLang('sv')">🇸🇪 Svenska</button>
      <button class="sidebar-item" onclick="setLang('en')">🇬🇧 English</button>
      <button class="sidebar-item" onclick="setLang('ar')">🇸🇦 العربية</button>
      <button class="sidebar-item" onclick="setLang('ru')">🇷🇺 Русский</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" data-i18n="title">Hub</div>
        <div class="topbar-sub" data-i18n="subtitle"></div>
      </div>
    </div>

    <div class="content">
      <div class="section-header" data-i18n="nav-projects"></div>

      <!-- ══ KORT 1 ══ -->
      <a class="card" href="https://azizbekovski.github.io/spin-the-vodka/" target="_blank" rel="noopener">
        <div class="card-icon">🍸</div>
        <div class="card-body">
          <div class="card-title">Spin the vodka</div>
          <div class="card-desc" data-i18n="stv-desc"></div>
        </div>
        <div class="card-meta">
          <span class="card-badge" data-i18n="badge-game"></span>
          <span data-i18n="by-azizbek"></span>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </a>

      <!-- ══ KORT 2 ══ -->
      <a class="card" href="https://good-player.github.io/chatp2p/" target="_blank" rel="noopener">
        <div class="card-icon">💬</div>
        <div class="card-body">
          <div class="card-title">CHATp2p</div>
          <div class="card-desc" data-i18n="chat-desc"></div>
        </div>
        <div class="card-meta">
          <span class="card-badge" data-i18n="badge-chat"></span>
          <span data-i18n="by-william"></span>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </a>

      <!-- ══ LÄGG TILL FLER KORT HÄR ══
      <a class="card" href="https://din-länk.com" target="_blank" rel="noopener">
        <div class="card-icon">🔧</div>
        <div class="card-body">
          <div class="card-title">Titel</div>
          <div class="card-desc">Beskrivning</div>
        </div>
        <div class="card-meta">
          <span class="card-badge" data-i18n="badge-game"></span>
          <span>Namn</span>
        </div>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </a>
      ══ SLUT PÅ MALL ══ -->

    </div>
  </div>

  <script>
    const translations = {
      sv: {
        title: "Hub",
        subtitle: "En hub för personliga projekt",
        "nav-projects": "Projekt",
        "nav-language": "Språk",
        "badge-game": "Spel",
        "badge-chat": "Chatt",
        "stv-desc": "En spel som uppdaterar ofta. Som cookie clicker men 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "Har du ingen discord? Använd CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "Ändringslogg",
        dir: "ltr",
      },
      en: {
        title: "Hub",
        subtitle: "A hub for personal projects",
        "nav-projects": "Projects",
        "nav-language": "Language",
        "badge-game": "Game",
        "badge-chat": "Chat",
        "stv-desc": "A game that updates often. Like cookie clicker but 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "No Discord? Use CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "Changelog",
        dir: "ltr",
      },
      ar: {
        title: "Hub",
        subtitle: "مركز للمشاريع الشخصية",
        "nav-projects": "المشاريع",
        "nav-language": "اللغة",
        "badge-game": "لعبة",
        "badge-chat": "دردشة",
        "stv-desc": "لعبة تتحدث كثيرًا. مثل cookie clicker ولكن 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "ليس لديك ديسكورد؟ استخدم CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "سجل التغييرات",
        dir: "rtl",
      },
      ru: {
        title: "Hub",
        subtitle: "Хаб личных проектов",
        "nav-projects": "Проекты",
        "nav-language": "Язык",
        "badge-game": "Игра",
        "badge-chat": "Чат",
        "stv-desc": "Игра, которая часто обновляется. Как cookie clicker, но 🇷🇺🇷🇺🇷🇺.",
        "chat-desc": "Нет Discord? Используй CHATP2P.",
        "by-azizbek": "Azizbek",
        "by-william": "William",
        "nav-changelog": "Журнал изменений",
        dir: "ltr",
      },
    };

    function setLang(code) {
      const t = translations[code];
      document.documentElement.lang = code;
      document.body.classList.toggle('rtl', t.dir === 'rtl');

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });

      // Mark active lang button
      document.querySelectorAll('.lang-section .sidebar-item').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick') === `setLang('${code}')`);
      });

      localStorage.setItem('hub-lang', code);
    }

    const saved = localStorage.getItem('hub-lang');
    setLang(translations[saved] ? saved : 'sv');

    // Load and render CHANGELOG.md
    fetch('CHANGELOG.md')
      .then(r => r.text())
      .then(text => {
        const el = document.getElementById('changelog');
        el.innerHTML = '';
        // Split into version blocks by "## vX.X.X" headings
        const blocks = text.trim().split(/^(?=## )/m);
        blocks.forEach(block => {
          if (!block.trim()) return;
          const lines = block.trim().split('\n');
          const heading = lines[0].replace(/^## /, '').trim();
          const items = lines.slice(1).filter(l => l.trim().startsWith('-'));
          const div = document.createElement('div');
          const h = document.createElement('div');
          h.className = 'cl-version';
          h.textContent = heading;
          div.appendChild(h);
          items.forEach(item => {
            const p = document.createElement('div');
            p.className = 'cl-item';
            p.textContent = item.replace(/^- /, '');
            div.appendChild(p);
          });
          el.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('changelog').textContent = '—';
      });
  </script>

</body>
</html>
